name: Deploy to GitHub Pages

# Build the Vite app and publish it to GitHub Pages on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch: # lets you trigger a deploy manually from the Actions tab

# Permissions the deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          # No npm cache here: caching keys off a committed lockfile, which we
          # intentionally don't commit (see .gitignore). Install is fast anyway.

      - name: Install dependencies
        # npm install (not npm ci) tolerates platform-specific optional deps:
        # the lockfile is generated on Windows but CI runs on Linux, which needs
        # different native/optional packages. npm ci is too strict for that.
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload build output
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
